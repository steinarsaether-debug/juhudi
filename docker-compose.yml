version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: juhudi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-juhudi_kilimo}
      POSTGRES_USER: ${DB_USER:-juhudi}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-juhudi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: juhudi_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-juhudi}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-juhudi_kilimo}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_IV_KEY: ${ENCRYPTION_IV_KEY}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-https://app.juhudikilimo.co.ke}
      MAX_FILE_SIZE_MB: 5
      UPLOAD_PATH: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.juhudikilimo.co.ke}
    container_name: juhudi_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  uploads_data:
